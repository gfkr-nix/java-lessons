<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:if="${user.id != null}">Редактирование пользователя</title>
    <title th:unless="${user.id != null}">Добавление пользователя</title>
    <style>
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 80px; }
        .btn { padding: 5px 10px; }
    </style>
</head>
<body>
<h1 th:if="${user.id != null}">Редактировать пользователя</h1>
<h1 th:unless="${user.id != null}">Добавить нового пользователя</h1>

<!-- Обратите внимание: для добавления используется action="/users" (POST) -->
<!-- для редактирования - action="/users/update" (POST) с передачей id -->
<form th:action="${user.id != null} ? '/users/update' : '/users'" method="post">
    <input type="hidden" name="id" th:value="${user.id}" th:if="${user.id != null}">

    <div class="form-group">
        <label for="name">Имя:</label>
        <input type="text" id="name" name="name" th:value="${user.name}" required>
    </div>
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" th:value="${user.email}" required>
    </div>
    <div class="form-group">
        <label for="age">Возраст:</label>
        <input type="number" id="age" name="age" th:value="${user.age}">
    </div>
    <div class="form-group">
        <button type="submit" class="btn">Сохранить</button>
        <a href="/users" class="btn">Отмена</a>
    </div>
</form>
</body>
</html>
