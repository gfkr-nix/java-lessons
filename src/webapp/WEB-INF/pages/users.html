<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список пользователей</title>
    <style>
        table { border-collapse: collapse; width: 80%; margin: 20px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .action-buttons { display: flex; gap: 5px; }
        .action-buttons form { display: inline; }
        .btn { padding: 5px 10px; text-decoration: none; border: 1px solid #ccc; border-radius: 3px; }
        .btn-edit { background-color: #ffc107; }
        .btn-delete { background-color: #dc3545; color: white; }
        .btn-add { margin: 20px; }
    </style>
</head>
<body>
<h1>Список пользователей</h1>
<a href="/users/new" class="btn btn-add">Добавить нового пользователя</a>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Email</th>
        <th>Возраст</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">Иван</td>
        <td th:text="${user.email}">ivan@mail.ru</td>
        <td th:text="${user.age}">25</td>
        <td>
            <div class="action-buttons">
                <!-- Ссылка на редактирование (GET) -->
                <a th:href="@{/users/edit(id=${user.id})}" class="btn btn-edit">Редактировать</a>
                <!-- Форма для удаления (POST) -->
                <form th:action="@{/users/delete}" method="post">
                    <input type="hidden" name="id" th:value="${user.id}">
                    <button type="submit" class="btn btn-delete" onclick="return confirm('Удалить пользователя?')">Удалить</button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>
<a href="/">На главную</a>
</body>
</html>
